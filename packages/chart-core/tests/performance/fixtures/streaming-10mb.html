<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streaming 10MB Benchmark</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }

      #chart-root {
        width: 800px;
        height: 600px;
      }
    </style>
  </head>
  <body>
    <div id="chart-root"></div>
    <script type="module">
      import { createChart } from '/src/api/create-chart.ts';

      const percentile = (values, percentileRank) => {
        if (values.length === 0) return 0;
        const sorted = [...values].sort((a, b) => a - b);
        const index = Math.min(
          sorted.length - 1,
          Math.ceil((percentileRank / 100) * sorted.length) - 1
        );
        return sorted[index];
      };

      const afterAnimationFrames = async (count) => {
        for (let i = 0; i < count; i++) {
          await new Promise((resolve) => requestAnimationFrame(resolve));
        }
      };

      const createPoints = (startX, count) => {
        const points = new Array(count);
        for (let i = 0; i < count; i++) {
          const x = startX + i;
          points[i] = {
            x,
            y: 50 + Math.sin(x / 50) * 40 + Math.cos(x / 17) * 10,
          };
        }
        return points;
      };

      const readHeap = () => {
        const memory = performance.memory;
        if (!memory) return undefined;
        return {
          usedJSHeapSize: memory.usedJSHeapSize,
          totalJSHeapSize: memory.totalJSHeapSize,
        };
      };

      window.runStreamingBenchmark = async ({
        pointsPerPoll,
        pollCount,
      }) => {
        const root = document.getElementById('chart-root');
        root.replaceChildren();

        const chart = createChart(
          root,
          { points: [{ x: 0, y: 50 }] },
          {
            type: 'line',
            width: 800,
            height: 600,
            showGrid: false,
            responsive: false,
          }
        );

        const canvas = root.querySelector('canvas');
        const canvasContext = canvas?.getContext('2d')?.constructor?.name ?? 'unknown';
        const operationTimes = [];
        const frameDeltas = [];
        const longTasks = [];
        let completedPolls = 0;
        let lastFrameTime;
        let collectingFrames = true;

        const observer =
          typeof PerformanceObserver === 'undefined'
            ? undefined
            : new PerformanceObserver((list) => {
                for (const entry of list.getEntries()) {
                  longTasks.push(entry.duration);
                }
              });

        try {
          observer?.observe({ entryTypes: ['longtask'] });
        } catch {
          // Not every browser exposes Long Tasks. The metric remains empty.
        }

        const collectFrame = (timestamp) => {
          if (lastFrameTime !== undefined) {
            frameDeltas.push(timestamp - lastFrameTime);
          }
          lastFrameTime = timestamp;
          if (collectingFrames) requestAnimationFrame(collectFrame);
        };

        requestAnimationFrame(collectFrame);
        await afterAnimationFrames(2);

        for (let poll = 0; poll < pollCount; poll++) {
          const points = createPoints(poll * pointsPerPoll + 1, pointsPerPoll);
          const start = performance.now();
          chart.addPointsIncremental(points, { autoRender: true, autoScroll: true });
          await afterAnimationFrames(2);
          operationTimes.push(performance.now() - start);
          completedPolls++;
        }

        await afterAnimationFrames(2);
        collectingFrames = false;
        observer?.disconnect();

        const maxOperationTime = operationTimes.length > 0 ? Math.max(...operationTimes) : 0;
        const maxFrameDelta = frameDeltas.length > 0 ? Math.max(...frameDeltas) : 0;
        const maxLongTask = longTasks.length > 0 ? Math.max(...longTasks) : 0;
        const state = chart.getState();
        chart.destroy();

        return {
          pointsPerPoll,
          pollCount,
          completedPolls,
          totalPoints: state.pointCount,
          operationTimes: {
            p95: percentile(operationTimes, 95),
            p99: percentile(operationTimes, 99),
            max: maxOperationTime,
          },
          frameDeltas: {
            count: frameDeltas.length,
            p95: percentile(frameDeltas, 95),
            p99: percentile(frameDeltas, 99),
            max: maxFrameDelta,
          },
          longTasks: {
            count: longTasks.length,
            maxDuration: maxLongTask,
          },
          heap: readHeap(),
          canvasContext,
        };
      };
    </script>
  </body>
</html>
